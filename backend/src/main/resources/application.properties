spring.application.name=medmuse

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:medmuse
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# PostgreSQL Configuration (production)
# spring.datasource.url=jdbc:postgresql://localhost:5432/medmuse
# spring.datasource.username=medmuse_user
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/api/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=openid, profile, email
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com

# Session Configuration
server.servlet.session.timeout=30m
spring.session.timeout=30m

# AI Service Configuration
# Switch this value to choose which provider is loaded at startup: `openai` or `gemini`
medmuse.ai.provider=openai

# OpenAI settings used when `medmuse.ai.provider=openai`
# Change the model here if you want to use another OpenAI model
medmuse.ai.openai.api-key=${OPENAI_API_KEY}
medmuse.ai.openai.model=gpt-5.4
medmuse.ai.openai.temperature=0.3

# Gemini settings used when `medmuse.ai.provider=gemini`
# Change the model here if you want to use another Gemini model
medmuse.ai.gemini.api-key=${MEDMUSE_GEMINI_API_KEY:}
medmuse.ai.gemini.model=gemini-2.0-flash
medmuse.ai.gemini.temperature=0.3

# File Storage Configuration
medmuse.storage.pdf.directory=./storage/pdfs
medmuse.storage.max-file-size=10MB

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=aviralkumar2003@gmail.com
spring.mail.password=AVIRALKUMAR2003
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# CORS Configuration
medmuse.cors.allowed-origins=http://localhost:5173
medmuse.frontend.dashboard-url=http://localhost:5173/dashboard

# Logging Configuration
logging.level.com.medmuse=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
